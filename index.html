<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shabir Ahmad Music Player</title>
  <link rel="icon" type="image/png" sizes="32x32" href="images/favicon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="player">
  <h2>🎧Shabir Music Player</h2>

  <input type="text" id="search" placeholder="Search song online...">

  <div class="song-info">
    <p id="title">Select a song</p>
  </div>

  <div class="progress-container" id="progressContainer">
    <div class="progress" id="progress"></div>
  </div>
  <div class="time">
    <span id="current">0:00</span>
    <span id="duration">0:00</span>
  </div>

  <div class="controls">
    <button id="prevBtn">⏮</button>
    <button id="playBtn">▶️</button>
    <button id="nextBtn">⏭</button>
  </div>

  <input type="range" min="0" max="1" step="0.01" id="volume" value="1">

  <ul id="playlist"></ul>

</div>

<audio id="audio"></audio>

<script src="script.js"></script>
</body>
</html>
